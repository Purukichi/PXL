<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Light theme (default) ── */
:root {
  --bg:      #f0efe9;
  --surface: #faf9f7;
  --border:  #dedad2;
  --border2: #e8e6e0;
  --t1:      #1e1d1b;
  --t2:      #5c5a55;
  --t3:      #a09e99;
  --r:       10px;
  --rs:      7px;
}
/* ── Dark theme ── */
.dark {
  --bg:      #181715;
  --surface: #222120;
  --border:  #333130;
  --border2: #2a2928;
  --t1:      #e8e6df;
  --t2:      #8c8a84;
  --t3:      #55534f;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--t1);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background 0.35s, color 0.35s;
}
button { font-family: inherit; cursor: pointer; }

/* ── Top bar ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: center; height: 46px; gap: 8px;
}
.logo { font-size: 14px; font-weight: 800; letter-spacing: -0.04em; color: var(--t1); flex: 1; }

/* ── Page ── */
.page { max-width: 1100px; margin: 0 auto; padding: 20px 20px 56px; display: flex; flex-direction: column; gap: 14px; }

/* ── Card ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); }
.card-inner { padding: 16px 18px; }
.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }

/* ── Preview ── */
.preview-area {
  position: relative; border-radius: var(--rs);
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  height: 360px;
  flex-shrink: 0; flex:1;
  overflow: hidden;
}
.pv-wrap {
  position: relative; flex-shrink: 0;
  transition: width 0.3s cubic-bezier(0.25,0.46,0.45,0.94),
              height 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
}
.pv-canvas {
  position: absolute; inset: 0; overflow: hidden; border-radius: 1px;
}
.pv-canvas.has-img { cursor: grab; }
.pv-canvas.has-img.panning { cursor: grabbing; }
.pv-img {
  position: absolute;
  transform-origin: center center;
  user-select: none; pointer-events: none;
  top: 50%; left: 50%;
}
.pv-frame {
  position: absolute; inset: 0;
  border: 1.5px solid var(--t1); border-radius: 1px;
  pointer-events: none; z-index: 3;
}
/* safe area SVG */
.pv-safe {
  position: absolute; inset: 0; pointer-events: none; z-index: 4;
}

/* drop */
.drop-hint {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; color: var(--t3); pointer-events: none;
}
.drop-hint span { font-size: 10px; font-weight: 600; opacity: 0.55; }
.drop-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.06);
  border: 2px dashed var(--t2); border-radius: var(--rs);
  display: flex; align-items: center; justify-content: center; z-index: 10;
}

/* dimension annotations */
.ann-h {
  position: absolute; left: 0; right: 0; top: -22px;
  display: flex; align-items: center; pointer-events: none;
}
.ann-v {
  position: absolute; top: 0; bottom: 0; right: -26px;
  display: flex; flex-direction: column; align-items: center; pointer-events: none;
}
.ann-line { background: var(--t3); }
.ann-h .ann-line { flex: 1; height: 1px; position: relative; }
.ann-v .ann-line { flex: 1; width: 1px; position: relative; }
.ann-cap { font-size: 7px; color: var(--t3); line-height: 1; }
.ann-val-h {
  position: absolute; left: 50%; top: -8px; transform: translateX(-50%);
  font-size: 10px; font-weight: 700; color: var(--t2); white-space: nowrap;
  background: var(--bg); padding: 0 4px; font-variant-numeric: tabular-nums;
}
.ann-val-v {
  position: absolute; top: 50%; left: 12px;
  transform: translateY(-50%) rotate(90deg); transform-origin: center;
  font-size: 10px; font-weight: 700; color: var(--t2); white-space: nowrap;
  background: var(--bg); padding: 0 3px; font-variant-numeric: tabular-nums;
}
.pv-badge-r {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  background: var(--t1); color: var(--surface);
  font-size: 10px; font-weight: 700; letter-spacing: 0.02em;
  padding: 3px 9px; border-radius: 99px; white-space: nowrap; z-index: 5;
  pointer-events: none;
}
.zoom-action-btn {
  font-size: 10px; font-weight: 700; color: var(--t3);
  border: 1px solid var(--border); border-radius: var(--rs);
  padding: 4px 8px; background: transparent; transition: all 0.12s;
  white-space: nowrap;
}
.zoom-action-btn:hover { border-color: var(--t2); color: var(--t2); }

/* draggable input */
.drag-input-wrap { position: relative; }
.drag-input-wrap input { cursor: ew-resize; }
.drag-input-wrap input:focus { cursor: text; }

/* ── Ratio chips ── */
.ratio-grid { display: flex; flex-wrap: wrap; gap: 5px; }
.ratio-chip {
  border: 1px solid var(--border); border-radius: var(--rs);
  padding: 5px 6px; background: transparent;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: all 0.22s; color: var(--t1); min-width: 52px;
}
.ratio-chip:hover { border-color: var(--t2); background: var(--bg); }
.ratio-chip.active { border-color: var(--t1); background: var(--t1); color: var(--surface); }
.ratio-chip .rl { font-size: 10px; font-weight: 700; letter-spacing: -0.01em; }

/* ── Input panel ── */
.input-row { display: grid; grid-template-columns: 1fr 30px 1fr; gap: 6px; align-items: center; }
.input-grp { display: flex; flex-direction: column; gap: 4px; }
.input-icon { display: flex; align-items: center; color: var(--t3); }
.input-grp input {
  width: 100%; padding: 7px 8px;
  font-size: 17px; font-weight: 700; letter-spacing: -0.02em;
  font-family: inherit; font-variant-numeric: tabular-nums;
  border: 1px solid var(--border); border-radius: var(--rs);
  background: var(--bg); color: var(--t1); outline: none;
  transition: border-color 0.13s; -moz-appearance: textfield;
}
.input-grp input::-webkit-outer-spin-button,
.input-grp input::-webkit-inner-spin-button { -webkit-appearance: none; }
.input-grp input:focus { border-color: var(--t2); background: var(--surface); }
.input-grp input.computed { color: var(--t2); background: var(--border2); border-color: transparent; }
.lock-btn {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid var(--border); background: transparent;
  transition: all 0.13s; color: var(--t3); margin-top: 17px;
}
.lock-btn:hover { border-color: var(--t2); color: var(--t2); }
.lock-btn.locked { border-color: var(--t1); background: var(--t1); color: var(--surface); }
.ratio-readout { font-size: 10px; font-weight: 600; color: var(--t3); text-align: center; font-variant-numeric: tabular-nums; }

/* ── Templates ── */
.cat-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.cat-tab {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: var(--rs);
  border: 1px solid var(--border); background: transparent;
  color: var(--t3); transition: all 0.12s;
}
.cat-tab:hover { border-color: var(--t2); color: var(--t2); }
.cat-tab.active { background: var(--t1); border-color: var(--t1); color: var(--surface); }
.tpl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 3px; }
.tpl-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 9px; border-radius: var(--rs); cursor: pointer;
  border: 1px solid transparent; transition: all 0.1s; gap: 6px;
}
.tpl-item:hover { background: var(--bg); border-color: var(--border2); }
.tpl-item.active { background: var(--border2); border-color: var(--border); }
.tpl-left { display: flex; align-items: center; gap: 6px; min-width: 0; }
.tpl-name { font-size: 11px; font-weight: 500; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tpl-size { font-size: 10px; color: var(--t3); font-variant-numeric: tabular-nums; font-weight: 600; flex-shrink: 0; }

/* ── Icon buttons ── */
.ic-btn {
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border); border-radius: var(--rs);
  padding: 6px; background: transparent;
  color: var(--t3); transition: all 0.12s;
}
.ic-btn:hover { border-color: var(--t2); color: var(--t2); }
.ic-btn.on { background: var(--t1); border-color: var(--t1); color: var(--surface); }
.ic-btn.danger:hover { border-color: #c0392b; color: #c0392b; }

/* dark toggle */
.dark-toggle {
  display: flex; align-items: center; gap: 5px;
  border: 1px solid var(--border); border-radius: 99px;
  padding: 4px 10px; background: transparent;
  font-size: 10px; font-weight: 700; color: var(--t3);
  transition: all 0.13s; letter-spacing: 0.04em;
}
.dark-toggle:hover { border-color: var(--t2); color: var(--t2); }
.dark-toggle.on { background: var(--t1); border-color: var(--t1); color: var(--surface); }
</style>
</head>

// ── Helpers ────────────────────────────────────────────────────────────────
function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
function toRatio(w, h) {
  if (!w || !h) return '—';
  const g = gcd(Math.round(w), Math.round(h));
  const rw = Math.round(w / g), rh = Math.round(h / g);
  if (rw > 60 || rh > 60) return `${(w / h).toFixed(3)}:1`;
  return `${rw}:${rh}`;
}
function detectRatio(w, h) {
  if (!w || !h) return null;
  const r = w / h;
  for (const ar of RATIOS) {
    if (Math.abs(r - ar.w / ar.h) < 0.013) return ar.label;
  }
  return null;
}

// ── Luminance histogram ────────────────────────────────────────────────────
function computeHistogram(imgEl) {
  const MAX = 160;
  const scale = Math.min(MAX / imgEl.naturalWidth, MAX / imgEl.naturalHeight, 1);
  const sw = Math.max(1, Math.round(imgEl.naturalWidth * scale));
  const sh = Math.max(1, Math.round(imgEl.naturalHeight * scale));
  const oc = document.createElement('canvas');
  oc.width = sw; oc.height = sh;
  const octx = oc.getContext('2d');
  octx.drawImage(imgEl, 0, 0, sw, sh);
  const data = octx.getImageData(0, 0, sw, sh).data;
  const N = 64;
  const r = new Array(N).fill(0), g = new Array(N).fill(0);
  const b = new Array(N).fill(0), lum = new Array(N).fill(0);
  for (let i = 0; i < data.length; i += 4) {
    if (data[i+3] > 0) {
      r[Math.min(N-1, data[i] >> 2)]++;
      g[Math.min(N-1, data[i+1] >> 2)]++;
      b[Math.min(N-1, data[i+2] >> 2)]++;
      const l = Math.round(0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2]);
      lum[Math.min(N-1, l >> 2)]++;
    }
  }
  return { r, g, b, lum };
}

// ── K-means++ palette extractor ───────────────────────────────────────────
function extractPalette(imgEl, k = 5) {
  const MAX = 80;
  const scale = Math.min(MAX / imgEl.naturalWidth, MAX / imgEl.naturalHeight, 1);
  const sw = Math.max(1, Math.round(imgEl.naturalWidth * scale));
  const sh = Math.max(1, Math.round(imgEl.naturalHeight * scale));
  const oc = document.createElement('canvas');
  oc.width = sw; oc.height = sh;
  const octx = oc.getContext('2d');
  octx.drawImage(imgEl, 0, 0, sw, sh);
  const data = octx.getImageData(0, 0, sw, sh).data;
  const pixels = [];
  for (let i = 0; i < data.length; i += 4) {
    if (data[i+3] > 128) pixels.push([data[i], data[i+1], data[i+2]]);
  }
  if (pixels.length < k) return null;
  // K-means++ init
  const centers = [pixels[Math.floor(Math.random() * pixels.length)]];
  for (let c = 1; c < k; c++) {
    const dists = pixels.map(p => centers.reduce((mn, cn) =>
      Math.min(mn, (p[0]-cn[0])**2 + (p[1]-cn[1])**2 + (p[2]-cn[2])**2), Infinity));
    const total = dists.reduce((a, b) => a + b, 0);
    let rand = Math.random() * total, idx = 0;
    for (let i = 0; i < dists.length; i++) { rand -= dists[i]; if (rand <= 0) { idx = i; break; } }
    centers.push(pixels[idx]);
  }
  // K-means iterations
  let clusters = centers;
  for (let iter = 0; iter < 20; iter++) {
    const assigns = Array.from({length: k}, () => []);
    for (const p of pixels) {
      let bc = 0, bd = Infinity;
      for (let c = 0; c < k; c++) {
        const d = (p[0]-clusters[c][0])**2 + (p[1]-clusters[c][1])**2 + (p[2]-clusters[c][2])**2;
        if (d < bd) { bd = d; bc = c; }
      }
      assigns[bc].push(p);
    }
    clusters = assigns.map((grp, c) => {
      if (!grp.length) return clusters[c];
      const n = grp.length;
      return [
        Math.round(grp.reduce((s,p)=>s+p[0],0)/n),
        Math.round(grp.reduce((s,p)=>s+p[1],0)/n),
        Math.round(grp.reduce((s,p)=>s+p[2],0)/n),
      ];
    });
  }
  return clusters.map(([r,g,b]) =>
    '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join(''));
}

// ── RatioChip ──────────────────────────────────────────────────────────────
function RatioChip({ ar, active, onClick }) {
  const cW = 28, cH = 20, m = 2;
  const maxW = cW - m*2, maxH = cH - m*2;
  const arR = ar.w / ar.h;
  let rw = maxW, rh = rw / arR;
  if (rh > maxH) { rh = maxH; rw = rh * arR; }
  rw = Math.max(rw, 2); rh = Math.max(rh, 2);
  return (
    <button className={`ratio-chip${active ? ' active' : ''}`} onClick={onClick} title={ar.label}>
      <svg width={cW} height={cH} viewBox={`0 0 ${cW} ${cH}`} style={{display:'block'}}>
        <rect
          x={(cW-rw)/2} y={(cH-rh)/2} width={rw} height={rh}
          fill={active ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.05)'}
          stroke="currentColor" strokeWidth="1.4" rx="1"
        />
      </svg>
      <span className="rl">{ar.label}</span>
    </button>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [ratio,    setRatio]   = useState(RATIOS[3]);
  const [linked,   setLinked]  = useState(true); // true=aspect ratio locked
  const [width,    setWidth]   = useState(1920);
  const [height,   setHeight]  = useState(1080);
  const [cat,      setCat]     = useState('all');
  const [tpl,      setTpl]     = useState(null);
  // Image
  const [showImg,   setShowImg]  = useState(false);
  const [imgSrc,    setImgSrc]   = useState(null);
  const [imgNat,    setImgNat_]   = useState({w:0,h:0});
  const setImgNat = v => { imgNatRef.current=v; setImgNat_(v); };
  const [fileDrag,  setFileDrag] = useState(false);
  const dragCounterRef = useRef(0);
  const [imgOff,    setImgOff_]  = useState({x:0, y:0});
  const setImgOff = v => { const val = typeof v==='function'?v(imgOffRef.current):v; imgOffRef.current=val; setImgOff_(val); };
  const [imgFileName, setImgFileName] = useState('');
  const [snapMode,  setSnapMode_] = useState('h');
  const setSnapMode = v => { snapModeRef.current=v; setSnapMode_(v); };
  const [panning,   setPanning_]  = useState(false);
  const setPanning = v => { panningRef.current=v; setPanning_(v); };
  // Overlays
  const [showSafe, setShowSafe]= useState(false);
  const [showBW,   setShowBW]  = useState(false);
  const [palette,   setPalette]   = useState(null);
  const [copiedColor, setCopiedColor] = useState(null);
  const [histogram, setHistogram] = useState(null);
  // Theme
  const [dark,     setDark]    = useState(false);

  const fileRef    = useRef();
  const imgRef     = useRef();
  const pvWrapRef  = useRef();
  const pvAreaRef  = useRef();
  const [pvAreaW, setPvAreaW] = useState(600);
  const [pvAreaH, setPvAreaH] = useState(320);
  const imgOffRef  = useRef({x:0, y:0});   // mirror of imgOff for rAF
  const snapModeRef = useRef('h');          // mirror of snapMode for rAF
  const imgNatRef  = useRef({w:0, h:0});   // mirror of imgNat for rAF
  const panningRef = useRef(false);

  // Apply dark class to body
  useEffect(() => {
    document.body.classList.toggle('dark', dark);
  }, [dark]);

  // Measure preview-area container for dynamic pvW/pvH
  useEffect(() => {
    if (!pvAreaRef.current) return;
    const ro = new ResizeObserver(([e]) => {
      const {width, height} = e.contentRect;
      setPvAreaW(width);
      setPvAreaH(height);
    });
    ro.observe(pvAreaRef.current);
    return () => ro.disconnect();
  }, []);

  // Sync image transform to pv-wrap actual size every frame (follows CSS transition)
  useEffect(() => {
    let rafId;
    const tick = () => {
      if (pvWrapRef.current && imgRef.current && imgNatRef.current.w) {
        const r = pvWrapRef.current.getBoundingClientRect();
        const aw = r.width, ah = r.height;
        const nat = imgNatRef.current;
        const scale = snapModeRef.current === 'h' ? ah / nat.h : aw / nat.w;
        const off = panningRef.current ? imgOffRef.current : imgOffRef.current;
        imgRef.current.style.transform =
          `translate(calc(-50% + ${off.x}px), calc(-50% + ${off.y}px)) scale(${scale})`;
      }
      rafId = requestAnimationFrame(tick);
    };
    rafId = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafId);
  }, []);



  const handleW = v => { const n=parseInt(v)||0; setWidth(n); if(linked) setHeight(Math.round(n*ratio.h/ratio.w)); setTpl(null); };
  const handleH = v => { const n=parseInt(v)||0; setHeight(n); if(linked) setWidth(Math.round(n*ratio.w/ratio.h)); setTpl(null); };

  const applyTpl = t2 => {
    setTpl(t2.name); setWidth(t2.w); setHeight(t2.h);
    let best=null, bestD=9999;
    const r=t2.w/t2.h;
    for (const ar of RATIOS) { const d=Math.abs(r-ar.w/ar.h); if(d<bestD){bestD=d;best=ar;} }
    if(best&&bestD<0.05) setRatio(best);
  };

  const loadFile = file => {
    if (!file || !file.type.startsWith('image/')) return;
    const baseName = file.name.replace(/\.[^.]+$/, '');
    setImgFileName(baseName);
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const nw = img.naturalWidth, nh = img.naturalHeight;
      setImgNat({w: nw, h: nh});
      // auto-apply natural dimensions as output size
      setWidth(nw); setHeight(nh); setTpl(null);
      // find closest matching ratio
      const r = nw / nh;
      let best = null, bestD = 9999;
      for (const ar of RATIOS) { const d = Math.abs(r - ar.w/ar.h); if (d < bestD) { bestD=d; best=ar; } }
      if (best) setRatio(best);
      const pal = extractPalette(img);
      if (pal) setPalette(pal);
      setHistogram(computeHistogram(img));
    };
    img.src = url;
    setImgSrc(url);
    setImgOff({x:0, y:0});
    setShowImg(true);
  };

  // On ratio/dim change: auto-select snapMode that causes overflow, then clamp offset
  useEffect(() => {
    if (!imgNat.w || !imgNat.h) { setImgOff({x:0,y:0}); return; }
    const imgAR  = imgNat.w / imgNat.h;
    const frameAR = pvW / pvH;
    // If image is wider than frame → fit height → overflow X → h-snap
    // If image is taller than frame → fit width  → overflow Y → v-snap
    const bestSnap = imgAR > frameAR ? 'h' : 'v';
    setSnapMode(bestSnap);
    // clamp offset for new snap/frame
    const scale = bestSnap === 'h' ? pvH / imgNat.h : pvW / imgNat.w;
    const iw = imgNat.w * scale, ih = imgNat.h * scale;
    const maxX = Math.max(0, (iw - pvW) / 2);
    const maxY = Math.max(0, (ih - pvH) / 2);
    setImgOff(prev => ({
      x: Math.max(-maxX, Math.min(maxX, prev.x)),
      y: Math.max(-maxY, Math.min(maxY, prev.y)),
    }));
  }, [pvW, pvH]);

  const resetImgPos = () => setImgOff({x:0, y:0});

  // File drag-drop onto preview area (always active, counter prevents flicker)
  const onFileDrop = e => { e.preventDefault(); dragCounterRef.current=0; setFileDrag(false); loadFile(e.dataTransfer.files[0]); setShowImg(true); };
  const onFileDragOver = e => { e.preventDefault(); };
  const onFileDragEnter = e => { e.preventDefault(); dragCounterRef.current++; setFileDrag(true); };
  const onFileDragLeave = () => { dragCounterRef.current--; if(dragCounterRef.current<=0){ dragCounterRef.current=0; setFileDrag(false); } };

  // Image pan: h-snap → X only moves, v-snap → Y only moves
  // Use sx/sy as running anchor updated each frame to avoid stale closure
  const onCanvasMouseDown = e => {
    if (!showImg || !imgSrc) return;
    e.preventDefault();
    // capture limits at drag start using current rendered size from rAF ref
    const nat = imgNatRef.current;
    const sm  = snapModeRef.current;
    const pw  = pvWrapRef.current ? pvWrapRef.current.getBoundingClientRect().width  : pvW;
    const ph  = pvWrapRef.current ? pvWrapRef.current.getBoundingClientRect().height : pvH;
    const sc  = sm === 'h' ? ph / nat.h : pw / nat.w;
    const maxX = Math.max(0, (nat.w * sc - pw) / 2);
    const maxY = Math.max(0, (nat.h * sc - ph) / 2);
    const clamp = (v, max) => Math.max(-max, Math.min(max, v));
    let prevMx = e.clientX, prevMy = e.clientY;
    setPanning(true);
    const onMove = ev => {
      const dx = (ev.clientX - prevMx) * 0.38;
      const dy = (ev.clientY - prevMy) * 0.38;
      prevMx = ev.clientX; prevMy = ev.clientY;
      setImgOff(prev => ({
        x: snapModeRef.current === 'h' ? clamp(prev.x + dx, maxX) : 0,
        y: snapModeRef.current === 'v' ? clamp(prev.y + dy, maxY) : 0,
      }));
    };
    const onUp = () => { setPanning(false); window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup',   onUp);
  };

  // Preview sizing — height fills the container, only width adjusts with aspect ratio
  const MAX_W = Math.max(pvAreaW - 80, 80);
  const MAX_H = Math.max(pvAreaH - 80, 80);
  const arNum = width && height ? width/height : 1;
  const pvH = Math.max(MAX_H, 32);
  const pvW = Math.max(Math.min(pvH * arNum, MAX_W), 32);

  const inputPx  = (width||0)*(height||0);
  // Image natural size ratio
  const natRatio = imgNat.w && imgNat.h ? toRatio(imgNat.w, imgNat.h) : null;
  const detR     = detectRatio(width, height);
  const cats     = ['all','display','video','social','web','mobile','print','music'];

  // Draggable number input: 5px mouse movement = 1px value change
  const makeDragInput = (getValue, setValue) => ({
    onMouseDown: e => {
      if (e.button !== 0) return;
      const startX   = e.clientX;
      const startVal = getValue();
      e.target.blur();
      const onMove = ev => {
        const delta = Math.round((ev.clientX - startX) / 5);
        setValue(Math.max(1, startVal + delta));
      };
      const onUp = () => {
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup',   onUp);
    }
  });

  const filtTpls = cat==='all' ? TEMPLATES : TEMPLATES.filter(t2=>t2.cat===cat);

  const dragW = makeDragInput(() => width,  v => { setWidth(v);  if(linked) setHeight(Math.round(v * ratio.h / ratio.w)); setTpl(null); });
  const dragH = makeDragInput(() => height, v => { setHeight(v); if(linked) setWidth(Math.round(v * ratio.w / ratio.h));  setTpl(null); });

  // ── Export (JPG or PNG) ──────────────────────────────────────────────────
  const exportImg = (fmt) => {
    const cW = width, cH = height;
    const canvas = document.createElement('canvas');
    canvas.width = cW; canvas.height = cH;
    const ctx = canvas.getContext('2d');
    // BG (PNG transparent if no image)
    if (fmt === 'jpg') {
      ctx.fillStyle = dark ? '#181715' : '#f0efe9';
      ctx.fillRect(0, 0, cW, cH);
    }
    // Image: scale from pvW/pvH preview to actual output size
    if (imgSrc && imgRef.current) {
      const img = imgRef.current;
      ctx.save();
      ctx.beginPath(); ctx.rect(0, 0, cW, cH); ctx.clip();
      if (showBW) ctx.filter = 'grayscale(1)';
      const scaleBase = snapMode === 'h' ? pvH / img.naturalHeight : pvW / img.naturalWidth;
      const outScale  = snapMode === 'h' ? cH  / img.naturalHeight : cW  / img.naturalWidth;
      const ratio = outScale / scaleBase;
      const iw = img.naturalWidth  * outScale;
      const ih = img.naturalHeight * outScale;
      const ix = cW/2 + imgOff.x * ratio - iw/2;
      const iy = cH/2 + imgOff.y * ratio - ih/2;
      ctx.drawImage(img, ix, iy, iw, ih);
      ctx.restore();
    }
    // Safe areas
    if (showSafe) {
      SAFE_AREAS.forEach(sa => {
        const inX = cW * (1 - sa.pct) / 2;
        const inY = cH * (1 - sa.pct) / 2;
        ctx.strokeStyle = sa.color;
        ctx.lineWidth = 0.5;
        ctx.setLineDash(sa.dash ? sa.dash.split(',').map(Number) : []);
        ctx.strokeRect(inX, inY, cW - inX*2, cH - inY*2);
      });
      ctx.setLineDash([]);
    }
    // Frame border
    ctx.strokeStyle = dark ? '#e8e6df' : '#1e1d1b';
    ctx.lineWidth = 1;
    ctx.strokeRect(0.5, 0.5, cW-1, cH-1);
    // Download
    const ratio_str = `${width}x${height}`;
    const base = imgFileName || 'image';
    const a = document.createElement('a');
    a.download = `${base}_${ratio_str}.${fmt}`;
    a.href = fmt === 'jpg'
      ? canvas.toDataURL('image/jpeg', 0.93)
      : canvas.toDataURL('image/png');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  const clearImage = () => { setImgSrc(null); setImgNat({w:0,h:0}); setImgOff({x:0,y:0}); setPalette(null); setCopiedColor(null); setHistogram(null); if(fileRef.current) fileRef.current.value=''; };

  const rotateAspect = () => {
    const newW = height, newH = width;
    setWidth(newW); setHeight(newH);
    const r = newW / newH;
    let best = null, bestD = 9999;
    for (const ar of RATIOS) { const d = Math.abs(r - ar.w/ar.h); if(d<bestD){bestD=d;best=ar;} }
    if (best) setRatio(best);
    setTpl(null);
  };

  return (
    <div>
      {/* ── Topbar ── */}
      <div className="topbar">
        <div className="logo">PXL</div>
        <button className={`dark-toggle${dark?' on':''}`} onClick={()=>setDark(d=>!d)}>
          {dark ? <Ic.sun/> : <Ic.moon/>}
        </button>
      </div>

      <div className="page" style={{flexDirection:'row', alignItems:'flex-start', gap:14}}>

        {/* ── Left sidebar: ratio only ── */}
        <div style={{display:'flex', flexDirection:'column', gap:10, width:220, flexShrink:0}}>
          <div className="card">
            <div className="card-inner">
              {[
                {svg:<svg width="16" height="10" viewBox="0 0 16 10" fill="none" stroke="currentColor" strokeWidth="1.4"><rect x="0.7" y="0.7" width="14.6" height="8.6" rx="1"/></svg>, list: RATIOS.filter(r=>r.w>r.h)},
                {svg:<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.4"><rect x="0.7" y="0.7" width="10.6" height="10.6" rx="1"/></svg>, list: RATIOS.filter(r=>r.w===r.h)},
              ].map((group,i)=>(
                group.list.length ? (
                  <div key={i} style={{marginBottom:8}}>
                    <div style={{color:'var(--t3)',marginBottom:5,opacity:0.7}}>{group.svg}</div>
                    <div className="ratio-grid">
                      {group.list.map(ar2=>(
                        <RatioChip key={ar2.label} ar={ar2} active={ratio.label===ar2.label} onClick={()=>{ setRatio(ar2); setHeight(Math.round(width * ar2.h / ar2.w)); }}/>
                      ))}
                    </div>
                  </div>
                ) : null
              ))}
              <button
                className="ic-btn"
                style={{width:'100%', marginTop:4, gap:6, justifyContent:'center'}}
                onClick={rotateAspect}
                title="向きを90°回転">
                <Ic.rotate/>
                <span style={{fontSize:10, fontWeight:700}}>90° 回転</span>
              </button>
            </div>
          </div>
          {/* ── Luminance Histogram ── */}
          <div className="card">
            <div className="card-inner" style={{padding:'12px 14px'}}>
              {histogram ? (() => {
                const W = 192, H = 56, N = histogram.r.length;
                const maxVal = Math.max(...histogram.lum, ...histogram.r, ...histogram.g, ...histogram.b, 1);
                const toPath = bins => {
                  const pts = bins.map((v,i)=>`${(i/N*W).toFixed(1)},${(H - v/maxVal*H*0.93).toFixed(1)}`).join(' L ');
                  return `M 0,${H} L ${pts} L ${W},${H} Z`;
                };
                return (
                  <div>
                    <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{display:'block', borderRadius:3, overflow:'hidden'}}>
                      <path d={toPath(histogram.r)}   fill="rgba(255,70,70,0.4)"/>
                      <path d={toPath(histogram.g)}   fill="rgba(50,190,80,0.4)"/>
                      <path d={toPath(histogram.b)}   fill="rgba(60,120,255,0.4)"/>
                      <path d={toPath(histogram.lum)} fill="var(--t1)" opacity="0.25"/>
                    </svg>
                    <div style={{display:'flex', justifyContent:'space-between', marginTop:5, fontSize:8, color:'var(--t3)', fontWeight:600}}>
                      <span>DARK</span>
                      <div style={{display:'flex', gap:5}}>
                        <span style={{color:'rgba(255,70,70,0.8)'}}>R</span>
                        <span style={{color:'rgba(50,190,80,0.9)'}}>G</span>
                        <span style={{color:'rgba(80,140,255,0.9)'}}>B</span>
                      </div>
                      <span>LIGHT</span>
                    </div>
                  </div>
                );
              })() : (
                <svg width="100%" height="56" viewBox="0 0 192 56" preserveAspectRatio="none" style={{display:'block', borderRadius:3, color:'var(--t3)', opacity:0.2}}>
                  {[4,10,18,28,38,46,50,48,42,34,26,20,14,8,5,4].map((h,i)=>(
                    <rect key={i} x={i*12+1} y={56-h} width={10} height={h} fill="currentColor" rx="1"/>
                  ))}
                </svg>
              )}
            </div>
          </div>

          {/* ── Color Palette ── */}
          <div className="card">
            <div className="card-inner" style={{padding:'10px 14px'}}>
              {palette ? (
                <div style={{display:'flex', gap:4}}>
                  {palette.map((hex, i) => (
                    <div key={i} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3}}>
                      <div
                        onClick={()=>{ navigator.clipboard.writeText(hex); setCopiedColor(hex); setTimeout(()=>setCopiedColor(null),1500); }}
                        style={{width:'100%', height:28, background:hex, borderRadius:'var(--rs)', cursor:'pointer', border:'1px solid rgba(0,0,0,0.1)', transition:'transform 0.1s'}}
                        onMouseEnter={e=>e.currentTarget.style.transform='scale(1.08)'}
                        onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}
                        title={`コピー: ${hex}`}
                      />
                      <span style={{fontSize:7, fontWeight:700, color: copiedColor===hex ? 'var(--t1)' : 'var(--t3)', letterSpacing:'0.02em', fontVariantNumeric:'tabular-nums', textAlign:'center', lineHeight:1}}>
                        {copiedColor===hex ? 'COPIED' : hex.toUpperCase()}
                      </span>
                    </div>
                  ))}
                </div>
              ) : (
                <div style={{height:28, display:'flex', alignItems:'center', justifyContent:'center'}}>
                  <span style={{fontSize:9, color:'var(--t3)'}}>—</span>
                </div>
              )}
            </div>
          </div>

          {/* ── B&W Toggle ── */}
          <div className="card">
            <div className="card-inner" style={{padding:'8px 14px'}}>
              <button
                className={`ic-btn${showBW?' on':''}`}
                style={{width:'100%', justifyContent:'center', gap:6}}
                onClick={()=>setShowBW(v=>!v)}
                title="白黒プレビュー切り替え">
                <Ic.bw/>
              </button>
            </div>
          </div>

          {/* ── Link ── */}
          <div className="card">
            <div className="card-inner" style={{padding:'8px 14px'}}>
              <a
                href="https://x.com/Purukichi3"
                target="_blank"
                rel="noopener noreferrer"
                className="ic-btn"
                style={{display:'flex', width:'100%', justifyContent:'center', textDecoration:'none', fontSize:12, letterSpacing:'0.06em'}}>
                {'> ⇀ <'}
              </a>
            </div>
          </div>
        </div>

        {/* ── Right column: preview + presets ── */}
        <div style={{flex:1, minWidth:0, display:'flex', flexDirection:'column', gap:10}}>

        {/* ── Preview ── */}
        <div className="card">
          <div className="card-inner">
            <div className="card-head">
              <div style={{display:'flex',alignItems:'center',gap:5,color:'var(--t3)'}}>
                <Ic.image/>
              </div>
              <div style={{display:'flex',gap:5,alignItems:'center'}}>
                {showImg && imgSrc && (
                  <button className="ic-btn danger" onClick={clearImage} title="Remove image"><Ic.trash/></button>
                )}
                <button className={`ic-btn${showSafe?' on':''}`} onClick={()=>setShowSafe(v=>!v)} title="Toggle safe area"><Ic.safe/></button>
                {showImg && (
                  <>
                    <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>loadFile(e.target.files[0])}/>
                    <button className="ic-btn" onClick={()=>fileRef.current.click()} title="Choose file"><Ic.upload/></button>
                  </>
                )}
                <button className={`ic-btn${showImg?' on':''}`} onClick={()=>setShowImg(v=>!v)} title="Toggle image">
                  {showImg ? <Ic.eyeOn/> : <Ic.eyeOff/>}
                </button>
                <div style={{width:1,height:14,background:'var(--border)',margin:'0 1px'}}/>
                {[{fmt:'jpg',bpp:0.08},{fmt:'png',bpp:0.5}].map(({fmt,bpp})=>{
                  const bytes=inputPx*bpp;
                  const sz=bytes>=1048576?(bytes/1048576).toFixed(1)+' MB':(bytes/1024).toFixed(0)+' KB';
                  return (
                    <button key={fmt} className="ic-btn"
                      style={{fontSize:10,fontWeight:700,letterSpacing:'0.06em',padding:'5px 8px'}}
                      title={`~${sz}`}
                      onClick={()=>exportImg(fmt)}>
                      {fmt.toUpperCase()}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* preview area + info panel */}
            <div style={{display:'flex', gap:14, alignItems:'flex-start'}}>
            <div
              className="preview-area"
              ref={pvAreaRef}
              onDrop={onFileDrop}
              onDragOver={onFileDragOver}
              onDragEnter={onFileDragEnter}
              onDragLeave={onFileDragLeave}
            >
              {fileDrag && <div className="drop-overlay"><Ic.drop/></div>}

              <div className="pv-wrap" ref={pvWrapRef} style={{width:pvW, height:pvH}}>

                {/* image canvas */}
                <div
                  className={`pv-canvas${showImg&&imgSrc?' has-img':''}${panning?' panning':''}`}
                  style={{position:'absolute',inset:0}}
                  onMouseDown={onCanvasMouseDown}
                >
                  {showImg && imgSrc && (
                    <img
                      ref={imgRef}
                      src={imgSrc}
                      alt=""
                      className="pv-img"
                      style={{
                        pointerEvents:'none', userSelect:'none',
                        maxWidth:'none', maxHeight:'none',
                        filter: showBW ? 'grayscale(1)' : 'none',
                      }}
                    />
                  )}
                  {showImg && !imgSrc && (
                    <div className="drop-hint">
                      <Ic.drop/>
                      <span>drop / select</span>
                    </div>
                  )}
                </div>

                {/* safe area SVG */}
                {showSafe && (
                  <svg className="pv-safe" viewBox={`0 0 ${pvW} ${pvH}`} preserveAspectRatio="none" width={pvW} height={pvH}>
                    {SAFE_AREAS.map(sa => {
                      const inX = pvW * (1-sa.pct)/2;
                      const inY = pvH * (1-sa.pct)/2;
                      return (
                        <g key={sa.label}>
                          <rect
                            x={inX} y={inY}
                            width={pvW-inX*2} height={pvH-inY*2}
                            fill="none" stroke={sa.color} strokeWidth="0.5"
                            strokeDasharray={sa.dash}
                          />
                          <text x={inX+4} y={inY+10} fill={sa.color} fontSize="8" fontWeight="700" fontFamily="monospace">{sa.label}</text>
                        </g>
                      );
                    })}
                  </svg>
                )}

                {/* frame border */}
                <div className="pv-frame"></div>

                {/* dimension annotations */}
                <div className="ann-h">
                  <span className="ann-cap">◀</span>
                  <div className="ann-line" style={{flex:1,height:1,position:'relative'}}>
                    <span className="ann-val-h">{width} px</span>
                  </div>
                  <span className="ann-cap">▶</span>
                </div>
                <div className="ann-v">
                  <span className="ann-cap">▲</span>
                  <div className="ann-line" style={{flex:1,width:1,position:'relative'}}>
                    <span className="ann-val-v">{height} px</span>
                  </div>
                  <span className="ann-cap">▼</span>
                </div>

                {/* badges */}
                <div className="pv-badge-r">{detR||toRatio(width,height)}</div>


              </div>{/* end pv-wrap */}

            </div>{/* end preview-area */}

            </div>{/* end preview flex row */}

            {/* bottom bar: source info + snap toggle */}
            <div style={{display:'flex', alignItems:'center', gap:12, marginTop:10, flexWrap:'wrap'}}>
              {natRatio && (
                <div style={{display:'flex', alignItems:'center', gap:8, fontSize:11, color:'var(--t2)', fontVariantNumeric:'tabular-nums'}}>
                  <span style={{fontWeight:700, color:'var(--t1)'}}>{natRatio}</span>
<span>{imgNat.w}×{imgNat.h}</span>
                  <button
                    onClick={()=>{ setWidth(imgNat.w); setHeight(imgNat.h); setTpl(null); const r=imgNat.w/imgNat.h; let best=null,bestD=9999; for(const ar of RATIOS){const d=Math.abs(r-ar.w/ar.h);if(d<bestD){bestD=d;best=ar;}} if(best)setRatio(best); }}
                    style={{fontSize:9, fontWeight:700, color:'var(--t2)', background:'transparent', border:'1px solid var(--border)', borderRadius:'var(--rs)', padding:'2px 7px', cursor:'pointer'}}
                    title="Reset output to source dimensions"
                  >↩</button>
                </div>
              )}
              {showImg && imgSrc && (
                <div style={{display:'flex', gap:6, marginLeft:'auto'}}>
                  <button className="zoom-action-btn" title="Snap top/bottom — drag left/right"
                    style={{borderColor:snapMode==='h'?'var(--t1)':'var(--border)', color:snapMode==='h'?'var(--t1)':'var(--t3)', fontWeight:snapMode==='h'?800:600, filter:'grayscale(1)'}}
                    onClick={()=>{ setSnapMode('h'); setImgOff({x:0,y:0}); }}>↕🔒</button>
                  <button className="zoom-action-btn" title="Snap left/right — drag top/bottom"
                    style={{borderColor:snapMode==='v'?'var(--t1)':'var(--border)', color:snapMode==='v'?'var(--t1)':'var(--t3)', fontWeight:snapMode==='v'?800:600, filter:'grayscale(1)'}}
                    onClick={()=>{ setSnapMode('v'); setImgOff({x:0,y:0}); }}>↔🔒</button>
                </div>
              )}
            </div>
          </div>{/* end card-inner */}
        </div>{/* end card */}

        {/* ── Pixel input ── */}
        <div className="card">
          <div className="card-inner" style={{padding:'12px 16px'}}>
            <div style={{display:'flex', alignItems:'center', gap:8}}>
              <div className="input-row" style={{flex:1}}>
                <div className="input-grp drag-input-wrap">
                  <div className="input-icon"><Ic.width/></div>
                  <input type="number" value={width||''} placeholder="1920"
                    onChange={e=>handleW(e.target.value)}
                    {...dragW}
                  />
                </div>
                <button className={`lock-btn${linked?' locked':''}`}
                  title={linked ? 'Aspect ratio locked' : 'Aspect ratio free'}
                  onClick={()=>setLinked(l=>!l)}>
                  {linked ? <Ic.lock/> : <Ic.unlock/>}
                </button>
                <div className="input-grp drag-input-wrap">
                  <div className="input-icon"><Ic.height/></div>
                  <input type="number" value={height||''} placeholder="1080"
                    onChange={e=>handleH(e.target.value)}
                    {...dragH}
                  />
                </div>
              </div>
              <div style={{display:'flex', alignItems:'center', gap:4, color:'var(--t3)', fontSize:11, fontVariantNumeric:'tabular-nums', whiteSpace:'nowrap'}}>
                <span>{detR||toRatio(width,height)}</span>
              </div>
            </div>
          </div>
        </div>

        {/* ── Presets ── */}
        <details className="card" open>
          <summary style={{padding:'10px 14px',fontSize:10,fontWeight:700,color:'var(--t3)',letterSpacing:'0.05em',cursor:'pointer',listStyle:'none',display:'flex',alignItems:'center',gap:6}}>
            <span style={{flex:1}}>PRESETS</span>
            <span style={{fontSize:9,fontVariantNumeric:'tabular-nums'}}>{filtTpls.length}</span>
          </summary>
          <div style={{borderTop:'1px solid var(--border)', padding:'8px 10px 4px'}}>
            <div style={{display:'flex', gap:4, marginBottom:6, flexWrap:'wrap'}}>
              {cats.map(c => {
                const Icon = CAT_ICONS[c];
                return (
                  <button key={c} className={`cat-tab${cat===c?' active':''}`}
                    onClick={()=>setCat(c)} title={c}>
                    <Icon/>
                  </button>
                );
              })}
            </div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))', gap:2}}>
              {filtTpls.map(t2 => {
                const CatIcon = CAT_ICONS[t2.cat];
                return (
                  <div key={t2.name} className={`tpl-item${tpl===t2.name?' active':''}`} onClick={()=>applyTpl(t2)}>
                    <div className="tpl-left">
                      <CatIcon/>
                      <span className="tpl-name">{t2.name}</span>
                    </div>
                    <span className="tpl-size">{t2.w}×{t2.h}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </details>

        </div>{/* end right column */}
      </div>
    </div>

  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
